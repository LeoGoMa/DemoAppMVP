# FinanzasFácil — Pipeline de Integración Continua
# Ejecuta: verificación de tipos, linting, pruebas y build.
# Se activa en: push a develop | PR hacia main.

name: FinanzasFácil CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:

  # ── JOB 1: Análisis Estático ──────────────────────────────────────
  verify:
    name: "Verificación Estática (TypeScript + ESLint)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npm run type-check
        env:
          SKIP_ENV_VALIDATION: true

      - name: Análisis de estilo con ESLint
        run: npm run lint
        env:
          SKIP_ENV_VALIDATION: true

  # ── JOB 2: Pruebas Unitarias ──────────────────────────────────────
  test:
    name: "Pruebas Unitarias con Cobertura"
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Ejecutar pruebas con reporte de cobertura
        run: npm test -- --coverage --passWithNoTests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          SKIP_ENV_VALIDATION: true

  # ── JOB 3: Build de Producción ────────────────────────────────────
  build:
    name: "Build Next.js (Verificación de empaquetado)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Construir bundle de Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          SKIP_ENV_VALIDATION: true
