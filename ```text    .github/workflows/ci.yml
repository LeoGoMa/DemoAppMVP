name: FinanzasFácil CI

# "Este pipeline se activa en dos momentos: cada push a la rama develop... y en cada Pull Request que apunta a main"
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # "Job 1 — Verificación Estática: Corre TypeScript... y ESLint"
  job1_verificacion_estatica:
    name: Job 1 — Verificación Estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci
      - name: Chequeo de Tipos (TypeScript)
        run: npx tsc --noEmit
      - name: Linter (ESLint)
        run: npm run lint

  # "Job 2 — Pruebas Unitarias: Solo corre si el Job 1 pasó... Las variables sensibles vienen de los Secrets"
  job2_pruebas_unitarias:
    name: Job 2 — Pruebas Unitarias
    needs: job1_verificacion_estatica # Esto asegura que no corra si el Job 1 falla
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci
      - name: Pruebas Unitarias (Jest)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} # Toma la variable de entorno
        run: npm run test -- --coverage

  # "Job 3 — Build de Producción: Solo corre si los dos anteriores pasaron... Construye el bundle de Next.js"
  job3_build_produccion:
    name: Job 3 — Build de Producción
    needs: job2_pruebas_unitarias # Esto asegura que no corra si el Job 2 falla
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci
      - name: Build de Next.js
        run: npm run build
